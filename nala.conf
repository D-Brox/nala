## Configuration file for Nala
Nala = {
  # Enable/disable auto-removing unused packages
  auto_remove = true

  # Enable/disable auto updating the package list when running upgrade
  auto_update = true

  # Set to true Nala will list the upgradable packages automatically after `update`
  update_show_packages = false

  # Set to true and Nala will always assume yes
  assume_yes = false
}

Ui = {
  # Output mode: "Auto", "Plain", or "Tui"
  mode = "Auto"

  # "Binary" => MiB/GiB, "Decimal" => MB/GB
  unit = "Binary"
}

Color = {
  # Color output mode: "Always", "Auto", or "Never"
  mode = "Auto"

  theme = {
    # Modifier Options:
    # BOLD, DIM, ITALIC, UNDERLINED, SLOW_BLINK,
    # RAPID_BLINK, REVERSED, HIDDEN, CROSSED_OUT
    #
    # Colors accept names (including Bright* aliases), 0-255 indexes, or hex (#RRGGBB).
    #
    # Multiple modifiers with RGB color.
    #
    # Primary = { modifier = "BOLD | ITALIC", fg = "#FFFA00" }
    # 256-color foreground with a background color.
    #
    # Secondary = { fg = "201", bg = "125" }
    # Named/Bright colors also work with modifiers and backgrounds.
    #
    # Highlight = { fg = "BrightGreen", bg = "#002B36", modifier = ["UNDERLINED", "BOLD"] }

    Primary = { fg = "BrightGreen" }
    Secondary = { fg = "BrightBlue" }
    Highlight = { fg = "BrightWhite" }
    ProgressFilled = { fg = "BrightGreen" }
    ProgressUnfilled = { fg = "BrightRed" }

    Notice = { fg = "BrightYellow" }
    Warning = { fg = "BrightYellow" }
    Error = { fg = "BrightRed" }
  }
}
